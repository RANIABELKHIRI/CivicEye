{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>CivicEye - تعديل المعلومات</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
         body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(0deg, #7e7d7d 0%, #bebebe 50%, #f5f5f5 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .error-message, .success-message {
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            text-align: center;
            position: absolute;
            bottom: -50px;
            right: 20px;
            left: 20px;
        }
        .error-message {
            background-color: #ffebee;
            color: red;
        }
        .success-message {
            background-color: #e8f5e8;
            color: green;
        }
        .edit-square {
            position: relative;
        }
        .edit-input:disabled {
            color: #6c757d;
            cursor: not-allowed;
            opacity: 0.7;
        }
         .logo {
            margin-top: -20px;
        }
    </style>
</head>
<body >

<div>
    <img src="{% static 'complaints/images/Frame 3.svg' %}" alt="CivicEye" class="logo">
    <a href="{% url 'citizen-home' %}" class="page-link">الصفحة الرئيسية</a>
    <div class="page-link page-separator">/</div>
    <a href="{% url 'edit-profile' %}" class="page-link page-edit">تعديل المعلومات</a>
</div>

<div class="edit-square">
    <div class="image-container">
        <img id="profileImage" class="pic" src="{% static 'accounts/images/user.png' %}" alt="صورة المستخدم">
        <img class="photo" src="{% static 'accounts/images/photo-camera.png' %}" alt="تغيير الصورة" onclick="document.getElementById('fileInput').click();">
        <input type="file" id="fileInput" style="display:none" accept="image/*" onchange="loadImage(event)">
    </div>

    <div class="edit-usename" style="top:30%;">اسم المستخدم</div>
    <input type="text" class="edit-input" id="usernameInput" style="top:140px;" placeholder="الاسم الكامل" dir="rtl">

    <div class="edit-usename" style="top:45%">البريد الإلكتروني / رقم الهاتف</div>
    <input type="text" class="edit-input" id="emailInput" style="top:200px;" placeholder="البريد الإلكتروني أو رقم الهاتف" dir="rtl" disabled>

    <div class="edit-usename" style="top:60%">نبذة</div>
    <input type="text" class="edit-input" id="aboutInput" style="top:260px;" placeholder="اكتب نبذة عن نفسك..." dir="rtl">

    <button class="edit-button" id="saveButton">تغيير</button>
</div>

<script>
let currentUser = null;

function loadImage(event) {
    const image = document.getElementById('profileImage');
    const file = event.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            image.src = e.target.result;
            if (currentUser) {
                currentUser.profileImage = e.target.result;
                saveUserToLocalStorage(currentUser);
                showMessage('تم تحديث الصورة بنجاح', 'success');
            }
        };
        reader.readAsDataURL(file);
    }
}

function showMessage(message, type) {
    const oldMsg = document.querySelector('.error-message');
    if (oldMsg) oldMsg.remove();
    const oldSuccess = document.querySelector('.success-message');
    if (oldSuccess) oldSuccess.remove();
    
    const msgDiv = document.createElement('div');
    msgDiv.className = type === 'error' ? 'error-message' : 'success-message';
    msgDiv.textContent = message;
    
    const editSquare = document.querySelector('.edit-square');
    editSquare.appendChild(msgDiv);
    
    setTimeout(() => {
        if (msgDiv && msgDiv.parentNode) {
            msgDiv.remove();
        }
    }, 3000);
}

function saveUserToLocalStorage(updatedUser) {
    const users = JSON.parse(localStorage.getItem('users') || '[]');
    const userIndex = users.findIndex(u => u.identifier === updatedUser.identifier);
    
    if (userIndex !== -1) {
        users[userIndex] = updatedUser;
        localStorage.setItem('users', JSON.stringify(users));
        localStorage.setItem('currentUser', JSON.stringify(updatedUser));
        currentUser = updatedUser;
    }
}

function isValidEmail(email) {
    const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
    return emailRegex.test(email);
}

function isValidPhone(phone) {
    const phoneRegex = /^(05|06|07)[0-9]{8}$/;
    return phoneRegex.test(phone);
}

function isIdentifierTaken(identifier, currentIdentifier) {
    const users = JSON.parse(localStorage.getItem('users') || '[]');
    return users.some(user => user.identifier === identifier && user.identifier !== currentIdentifier);
}

function loadUserData() {
    const storedUser = localStorage.getItem('currentUser');
    if (!storedUser) {
        window.location.href = 'login.html';
        return;
    }
    
    currentUser = JSON.parse(storedUser);
    
    const fullName = `${currentUser.firstName} ${currentUser.lastName}`;
    document.getElementById('usernameInput').value = fullName;
    
    document.getElementById('emailInput').value = currentUser.identifier;
    
    if (currentUser.about) {
        document.getElementById('aboutInput').value = currentUser.about;
    }
    
    if (currentUser.profileImage && currentUser.profileImage !== 'imags/user.png') {
        document.getElementById('profileImage').src = currentUser.profileImage;
    }
}

async function saveChanges() {
    const usernameValue = document.getElementById('usernameInput').value.trim();
    const aboutValue = document.getElementById('aboutInput').value.trim();

    const nameParts = usernameValue.split(' ');
    let firstName = nameParts[0] || '';
    let lastName = nameParts.slice(1).join(' ') || '';

    // 🔥 1. localStorage (نفس القديم)
    const updatedUser = {
        ...currentUser,
        firstName: firstName,
        lastName: lastName,
        about: aboutValue
    };

    saveUserToLocalStorage(updatedUser);

    // 🔥 2. Django API (إضافة فقط)
    const token = localStorage.getItem('access');

    if (token) {
        try {
            await fetch('/api/accounts/profile/edit/', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({
                    first_name: firstName,
                    last_name: lastName,
                    bio: aboutValue
                })
            });

            showMessage('تم التحديث محليًا وفي السيرفر', 'success');

        } catch (e) {
            showMessage('تم الحفظ محليًا فقط', 'error');
        }
    } else {
        showMessage('تم الحفظ محليًا فقط (لا يوجد تسجيل دخول)', 'success');
    }
}

document.addEventListener('DOMContentLoaded', function() {
    loadUserData();
    
    const saveButton = document.getElementById('saveButton');
    if (saveButton) {
        saveButton.addEventListener('click', saveChanges);
    }
});
</script>

</body>
</html>
